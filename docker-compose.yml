version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: AuthCation@247
      POSTGRES_DB: DBAuthentication
    ports:
      - "5432:5432"
    volumes:
      - ./data-base/sql-scripts/init-authentication-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d DBAuthentication"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - elastic
  api:
    build:
      context: ./api/JWTAuthentication
      dockerfile: Dockerfile
    ports:
      - "5002:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
    networks:
      - elastic
networks:
  elastic:
    driver: bridge
